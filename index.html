<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day-Night Toggle — 三版本对比</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f8fafc; color: #0f172a;
    min-height: 100vh; padding: 40px 20px;
    transition: background 0.7s, color 0.7s;
  }
  body.dark { background: #0f172a; color: #f1f5f9; }
  h1 { text-align: center; font-size: 26px; margin-bottom: 8px; }
  .sub { text-align: center; font-size: 14px; opacity: .6; margin-bottom: 30px; }
  .grid { display: grid; grid-template-columns: repeat(2, 320px); gap: 40px; justify-content: center; max-width: 720px; margin: 0 auto; }
  .card {
    flex: 0 0 320px; max-width: 320px;
    background: #fff; border: 1px solid #e2e8f0; border-radius: 16px;
    padding: 30px 20px 24px; text-align: center;
  }
  body.dark .card { background: #1e293b; border-color: #334155; }
  .card h2 { font-size: 18px; margin-bottom: 2px; }
  .card .ver { font-size: 12px; opacity: .5; margin-bottom: 20px; }
  .tw { margin: 24px 0; display: flex; justify-content: center; min-height: 40px; overflow: hidden; }
  .card .tags { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin-top: 12px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #e2e8f0; color: #475569; }
  body.dark .tag { background: #334155; color: #94a3b8; }

  /* ==================== 共用轨道样式 ==================== */
  .cmp { cursor: pointer; width: 90px; height: 35px; position: relative; display: inline-block; }
  .cmp .ct { position: absolute; width: 90px; height: 35px; background: rgba(70,133,192,1); border-radius: 50px; box-shadow: inset 0 0 2.5px 1.5px rgba(0,0,0,.5); overflow: hidden; transition: .7s cubic-bezier(0,.5,1,1); }
  body.dark .cmp .ct { background: rgba(25,30,50,1); }
  .cmp .mb {
    margin: 3.75px 0 0 3.75px; width: 27.5px; height: 27.5px; background: rgba(255,195,35,1); border-radius: 50%;
    box-shadow: 1.5px 1.5px 2.5px rgba(0,0,0,.5), inset -1.5px -2.5px 1.5px -1.5px rgba(0,0,0,.5), inset 2px 2.5px 1px -1px rgba(255,230,80,1);
    transition: 1s cubic-bezier(.56,1.35,.52,1); position: relative; z-index: 3;
  }
  body.dark .cmp .mb { transform: translateX(55px); background: rgba(195,200,210,1); box-shadow: 1.5px 1.5px 2.5px rgba(0,0,0,.5), inset -1.5px -2.5px 1.5px -1.5px rgba(0,0,0,.5), inset 2px 2.5px 1px -1px rgba(255,255,210,1); }
  .cmp .mo { position: absolute; background: rgba(150,160,180,1); box-shadow: inset 0 0 .5px .5px rgba(0,0,0,.3); border-radius: 50%; transition: .5s; opacity: 0; z-index: 2; }
  .cmp .mo:nth-child(1) { top: 3.75px; left: 12.5px; width: 6.25px; height: 6.25px; }
  .cmp .mo:nth-child(2) { top: 10px; left: 3.75px; width: 10px; height: 10px; }
  .cmp .mo:nth-child(3) { top: 16.25px; left: 16.25px; width: 6.25px; height: 6.25px; }
  body.dark .cmp .mo { opacity: 1; }
  .cmp .db { position: absolute; border-radius: 50%; transition: 1s cubic-bezier(.56,1.35,.52,1); }
  .cmp .db:nth-child(2) { top: -10px; left: -10px; width: 55px; height: 55px; background: rgba(255,255,255,.2); z-index: -2; }
  .cmp .db:nth-child(3) { top: -16.25px; left: -8.75px; width: 67.5px; height: 67.5px; background: rgba(255,255,255,.1); z-index: -3; }
  .cmp .db:nth-child(4) { top: -22.5px; left: -7.5px; width: 80px; height: 80px; background: rgba(255,255,255,.05); z-index: -4; }
  body.dark .cmp .db:nth-child(2) { transform: translateX(55px); }
  body.dark .cmp .db:nth-child(3) { transform: translateX(40px); }
  body.dark .cmp .db:nth-child(4) { transform: translateX(25px); }
  .cmp .cl, .cmp .cll { transform: translateY(5px); transition: 1s cubic-bezier(.56,1.35,.52,1); }
  body.dark .cmp .cl, body.dark .cmp .cll { transform: translateY(40px); }
  .cmp .cs { position: absolute; background: #fff; border-radius: 50%; z-index: -1; }
  .cmp .cs:nth-child(6n+1) { right: -10px; bottom: 5px; width: 25px; height: 25px; }
  .cmp .cs:nth-child(6n+2) { right: -5px; bottom: -12.5px; width: 30px; height: 30px; }
  .cmp .cs:nth-child(6n+3) { right: 10px; bottom: -20px; width: 30px; height: 30px; }
  .cmp .cs:nth-child(6n+4) { right: 25px; bottom: -17.5px; width: 30px; height: 30px; }
  .cmp .cs:nth-child(6n+5) { right: 37.5px; bottom: -30px; width: 37.5px; height: 37.5px; }
  .cmp .cs:nth-child(6n+6) { right: 55px; bottom: -25px; width: 30px; height: 30px; }
  .cmp .cl { z-index: -2; }
  .cmp .cll { position: absolute; right: 0; bottom: 12.5px; opacity: .5; z-index: -3; }
  .cmp .st { transform: translateY(-62.5px); z-index: -2; transition: 1s cubic-bezier(.56,1.35,.52,1); opacity: 0; }
  body.dark .cmp .st { transform: translateY(-31.25px); opacity: 1; }
  .big { --s: 3.75px; } .med { --s: 2.5px; } .sml { --s: 1.5px; }
  .cmp .sr { position: absolute; width: calc(2 * var(--s)); height: calc(2 * var(--s)); }
  .cmp .ss { float: left; }
  .cmp .ss:nth-child(1) { --p: left 0; } .cmp .ss:nth-child(2) { --p: right 0; }
  .cmp .ss:nth-child(3) { --p: 0 bottom; } .cmp .ss:nth-child(4) { --p: right bottom; }
  .cmp .ss { width: var(--s); height: var(--s); background-image: radial-gradient(circle var(--s) at var(--p), transparent var(--s), #fff); }

  /* ========== v1 星星位置 + JS twinkle ========== */
  .v1 .cmp .sr:nth-child(1) { top: 5px; left: 20px; }
  .v1 .cmp .sr:nth-child(2) { top: 10px; left: 47.5px; }
  .v1 .cmp .sr:nth-child(3) { top: 10px; left: 10px; }
  .v1 .cmp .sr:nth-child(4) { top: 17.5px; left: 25px; }
  .v1 .cmp .sr:nth-child(5) { top: 25px; left: 40px; }
  .v1 .cmp .sr:nth-child(6) { top: 25px; left: 10px; }
  .v1 .cmp .sr { transform: scale(1); transition: transform .5s; }
  .v1 .cmp .tw { transform: scale(0); }

  /* ========== v2 星星位置 + CSS animation ========== */
  .v2 .cmp .sr { transform: scale(1); transition: 1s; animation-iteration-count: infinite; animation-direction: alternate; animation-timing-function: linear; }
  .v2 .cmp .sr:nth-child(1) { top: 5.5px; left: 19.5px; animation-name: st; animation-duration: 3.5s; }
  .v2 .cmp .sr:nth-child(2) { top: 19.5px; left: 45.5px; animation-name: st; animation-duration: 4.1s; }
  .v2 .cmp .sr:nth-child(3) { top: 13px; left: 9.5px; animation-name: st; animation-duration: 4.9s; }
  .v2 .cmp .sr:nth-child(4) { top: 18.5px; left: 33px; animation-name: st; animation-duration: 5.3s; }
  .v2 .cmp .sr:nth-child(5) { top: 11.5px; left: 37.5px; animation-name: st; animation-duration: 3s; }
  .v2 .cmp .sr:nth-child(6) { top: 25.5px; left: 19px; animation-name: st; animation-duration: 2.2s; }
  @keyframes st { 0%,20% { transform: scale(0); } 20%,100% { transform: scale(1); } }
  /* v2 hover: cloud-son transition */
  .v2 .cmp .cs { transition: transform 6s, right 1s, bottom 1s; }

  /* View Transitions — disable default crossfade, use custom clip-path ripple */
  ::view-transition-old(root) { animation: none; }
  ::view-transition-new(root) { animation: none; }
</style>
</head>
<body>

<h1>🌗 白天黑夜切换按钮 · 版本对比</h1>
<p class="sub">点击任意按钮切换 · 其他自动同步 · 点击空白卡片区直接切换 body 主题</p>

<div class="grid">

<!-- ===== v1.0 ===== -->
<div class="card v1">
  <h2>🌤️ v1.0</h2>
  <div class="ver">JS 定时闪烁 · 无 hover 交互</div>
  <div class="tw" id="v1wrap">
    <div class="cmp" id="t1">
      <div class="ct">
        <div class="mb"><div class="mo"></div><div class="mo"></div><div class="mo"></div></div>
        <div class="db"></div><div class="db"></div><div class="db"></div>
        <div class="cl"><div class="cs"></div><div class="cs"></div><div class="cs"></div><div class="cs"></div><div class="cs"></div><div class="cs"></div></div>
        <div class="cll"><div class="cs"></div><div class="cs"></div><div class="cs"></div><div class="cs"></div><div class="cs"></div><div class="cs"></div></div>
        <div class="st"><div class="sr big"><div class="ss"></div><div class="ss"></div><div class="ss"></div><div class="ss"></div></div><div class="sr big"><div class="ss"></div><div class="ss"></div><div class="ss"></div><div class="ss"></div></div><div class="sr med"><div class="ss"></div><div class="ss"></div><div class="ss"></div><div class="ss"></div></div><div class="sr med"><div class="ss"></div><div class="ss"></div><div class="ss"></div><div class="ss"></div></div><div class="sr sml"><div class="ss"></div><div class="ss"></div><div class="ss"></div><div class="ss"></div></div><div class="sr sml"><div class="ss"></div><div class="ss"></div><div class="ss"></div><div class="ss"></div></div></div>
      </div>
    </div>
  </div>
  <div class="tags"><span class="tag">JS 循环闪烁</span><span class="tag">星星集中在左</span><span class="tag">无 hover</span></div>
</div>

<!-- ===== v2.0 ===== -->
<div class="card v2">
  <h2>🌙 v2.0</h2>
  <div class="ver">CSS 动画闪烁 · hover 扩散交互</div>
  <div class="tw" id="v2wrap">
    <div class="cmp" id="t2">
      <div class="ct">
        <div class="mb"><div class="mo"></div><div class="mo"></div><div class="mo"></div></div>
        <div class="db"></div><div class="db"></div><div class="db"></div>
        <div class="cl"><div class="cs"></div><div class="cs"></div><div class="cs"></div><div class="cs"></div><div class="cs"></div><div class="cs"></div></div>
        <div class="cll"><div class="cs"></div><div class="cs"></div><div class="cs"></div><div class="cs"></div><div class="cs"></div><div class="cs"></div></div>
        <div class="st"><div class="sr big"><div class="ss"></div><div class="ss"></div><div class="ss"></div><div class="ss"></div></div><div class="sr big"><div class="ss"></div><div class="ss"></div><div class="ss"></div><div class="ss"></div></div><div class="sr med"><div class="ss"></div><div class="ss"></div><div class="ss"></div><div class="ss"></div></div><div class="sr med"><div class="ss"></div><div class="ss"></div><div class="ss"></div><div class="ss"></div></div><div class="sr sml"><div class="ss"></div><div class="ss"></div><div class="ss"></div><div class="ss"></div></div><div class="sr sml"><div class="ss"></div><div class="ss"></div><div class="ss"></div><div class="ss"></div></div></div>
      </div>
    </div>
  </div>
  <div class="tags"><span class="tag">CSS @keyframes</span><span class="tag">星星分散</span><span class="tag">hover 扩散</span></div>
</div>

<!-- ===== v3.0 (Web Component, no system detection) ===== -->
<div class="card v3">
  <h2>🌃 v3.0</h2>
  <div class="ver">Web Component · 无系统主题检测</div>
  <div class="tw" id="v3wrap">
    <theme-button value="light" size="1.5"></theme-button>
  </div>
  <div class="tags"><span class="tag">Web Component</span><span class="tag">Shadow DOM</span><span class="tag">无系统检测</span></div>
</div>

<!-- ===== v4.0 (Web Component, inlined) ===== -->
<div class="card v4">
  <h2>🎛️ v4.0</h2>
  <div class="ver">Web Component · 系统主题自动检测</div>
  <div class="tw" id="v4wrap">
    <theme-button value="light" size="1.5"></theme-button>
  </div>
  <div class="tags"><span class="tag">Shadow DOM</span><span class="tag">自定义 size</span><span class="tag">自动跟随系统</span></div>
</div>

</div>

<script>
/* =========================================================
   v1.0 — 共用 toggle 状态机
   ========================================================= */
function makeToggle(rootId) {
  const r = document.getElementById(rootId);
  const mb = r.querySelector('.mb');
  const db = r.querySelectorAll('.db');
  const cl = r.querySelector('.cl');
  const cll = r.querySelector('.cll');
  const ct = r.querySelector('.ct');
  const mo = r.querySelectorAll('.mo');
  const st = r.querySelector('.st');
  let dark = false;

  function setD() {
    mb.style.transform = 'translateX(55px)';
    mb.style.backgroundColor = 'rgba(195,200,210,1)';
    mb.style.boxShadow = '1.5px 1.5px 2.5px rgba(0,0,0,0.5), inset -1.5px -2.5px 1.5px -1.5px rgba(0,0,0,0.5), inset 2px 2.5px 1px -1px rgba(255,255,210,1)';
    db[0].style.transform = 'translateX(55px)';
    db[1].style.transform = 'translateX(40px)';
    db[2].style.transform = 'translateX(25px)';
    cl.style.transform = 'translateY(40px)';
    cll.style.transform = 'translateY(40px)';
    ct.style.backgroundColor = 'rgba(25,30,50,1)';
    mo.forEach(m => m.style.opacity = '1');
    st.style.transform = 'translateY(-31.25px)';
    st.style.opacity = '1';
    dark = true;
  }
  function setL() {
    mb.style.transform = 'translateX(0)';
    mb.style.backgroundColor = 'rgba(255,195,35,1)';
    mb.style.boxShadow = '1.5px 1.5px 2.5px rgba(0,0,0,0.5), inset -1.5px -2.5px 1.5px -1.5px rgba(0,0,0,0.5), inset 2px 2.5px 1px -1px rgba(255,230,80,1)';
    db[0].style.transform = 'translateX(0)';
    db[1].style.transform = 'translateX(0)';
    db[2].style.transform = 'translateX(0)';
    cl.style.transform = 'translateY(5px)';
    cll.style.transform = 'translateY(5px)';
    ct.style.backgroundColor = 'rgba(70,133,192,1)';
    mo.forEach(m => m.style.opacity = '0');
    st.style.transform = 'translateY(-62.5px)';
    st.style.opacity = '0';
    dark = false;
  }
  r.addEventListener('click', () => { dark ? setL() : setD(); });
  return { setD, setL, isDark: () => dark, el: r, toggle: () => dark ? setL() : setD() };
}

// v1
const v1 = makeToggle('t1');
// v1 JS star twinkle
(function() {
  const stars = [...document.querySelectorAll('#t1 .sr')].sort(() => 0.5 - Math.random());
  const td = 0.5, pd = 2;
  function twinkle() {
    stars.forEach((s, i) => {
      setTimeout(() => {
        s.classList.add('tw');
        setTimeout(() => {
          s.classList.remove('tw');
          if (i === stars.length - 1) setTimeout(twinkle, pd * 1000);
        }, td * 1000);
      }, i * (td + pd) * 1000);
    });
  }
  twinkle();
})();

// v2
const v2 = makeToggle('t2');
// v2 hover interaction
(function() {
  const r = document.getElementById('t2');
  const cs = r.querySelectorAll('.cs');
  const sr = r.querySelectorAll('.sr');
  const v2Star = [
    { t: 5.5, l: 19.5 }, { t: 19.5, l: 45.5 }, { t: 13, l: 9.5 },
    { t: 18.5, l: 33 }, { t: 11.5, l: 37.5 }, { t: 25.5, l: 19 },
  ];
  const cOrig = [
    { r: -10, b: 5 }, { r: -5, b: -12.5 }, { r: 10, b: -20 },
    { r: 25, b: -17.5 }, { r: 37.5, b: -30 }, { r: 55, b: -25 },
  ];
  const cExp = [
    { r: -24, b: 10 }, { r: -12, b: -27 }, { r: 17, b: -43 },
    { r: 46, b: -39 }, { r: 70, b: -65 }, { r: 109, b: -54 },
  ];
  r.addEventListener('mouseenter', () => {
    const dk = document.body.classList.contains('dark');
    if (dk) {
      sr.forEach((s, i) => {
        if (i < v2Star.length) { s.style.top = (v2Star[i].t - 1.5) + 'px'; s.style.left = (v2Star[i].l - 3) + 'px'; }
      });
    } else {
      cs.forEach((c, i) => {
        const idx = i % 6;
        if (idx < cExp.length) { c.style.right = cExp[idx].r + 'px'; c.style.bottom = cExp[idx].b + 'px'; }
      });
    }
  });
  r.addEventListener('mouseleave', () => {
    const dk = document.body.classList.contains('dark');
    if (dk) {
      sr.forEach((s, i) => {
        if (i < v2Star.length) { s.style.top = v2Star[i].t + 'px'; s.style.left = v2Star[i].l + 'px'; }
      });
    } else {
      cs.forEach((c, i) => {
        const idx = i % 6;
        if (idx < cOrig.length) { c.style.right = cOrig[idx].r + 'px'; c.style.bottom = cOrig[idx].b + 'px'; }
      });
    }
  });
})();

/* =========================================================
   v4.0 — Web Component (直接内联, 无 CDN 依赖)
   ========================================================= */
(function() {
  const func = (root, initTheme, changeTheme) => {
    const $ = s => { const d = root.querySelectorAll(s); return d.length === 1 ? d[0] : d; };
    const mb = $('.mb'), db = $('.db'), cl = $('.cl'), cs = $('.cs'), cll = $('.cll'), ct = $('.ct'), mo = $('.mo'), st = $('.st'), sr = $('.sr');
    let isMoved = false, isClicked = false;

    // Pure toggle — applies visual changes only, no event dispatch
    const applyToggle = () => {
      if (isMoved) {
        mb.style.transform = 'translateX(0)'; mb.style.backgroundColor = 'rgba(255,195,35,1)';
        mb.style.boxShadow = '3em 3em 5em rgba(0,0,0,0.5), inset -3em -5em 3em -3em rgba(0,0,0,0.5), inset 4em 5em 2em -2em rgba(255,230,80,1)';
        db[0].style.transform = 'translateX(0)'; db[1].style.transform = 'translateX(0)'; db[2].style.transform = 'translateX(0)';
        cl.style.transform = 'translateY(10em)'; cll.style.transform = 'translateY(10em)';
        ct.style.backgroundColor = 'rgba(70,133,192,1)';
        mo.forEach(m => m.style.opacity = '0');
        st.style.transform = 'translateY(-125em)'; st.style.opacity = '0';
      } else {
        mb.style.transform = 'translateX(110em)'; mb.style.backgroundColor = 'rgba(195,200,210,1)';
        mb.style.boxShadow = '3em 3em 5em rgba(0,0,0,0.5), inset -3em -5em 3em -3em rgba(0,0,0,0.5), inset 4em 5em 2em -2em rgba(255,255,210,1)';
        db[0].style.transform = 'translateX(110em)'; db[1].style.transform = 'translateX(80em)'; db[2].style.transform = 'translateX(50em)';
        cl.style.transform = 'translateY(80em)'; cll.style.transform = 'translateY(80em)';
        ct.style.backgroundColor = 'rgba(25,30,50,1)';
        mo.forEach(m => m.style.opacity = '1');
        st.style.transform = 'translateY(-62.5em)'; st.style.opacity = '1';
      }
      isMoved = !isMoved;
    };

    // User click — apply toggle + dispatch change event for sync
    ct.onclick = () => {
      applyToggle();
      changeTheme(isMoved ? 'dark' : 'light');
      isClicked = true; setTimeout(() => { isClicked = false; }, 500);
    };
    mb.addEventListener('mousemove', function() {
      if (isClicked) return;
      if (isMoved) {
        mb.style.transform = 'translateX(100em)';
        db[0].style.transform = 'translateX(100em)'; db[1].style.transform = 'translateX(73em)'; db[2].style.transform = 'translateX(46em)';
        if (sr[0]) { sr[0].style.top = '8em'; sr[0].style.left = '33em'; }
        if (sr[1]) { sr[1].style.top = '36em'; sr[1].style.left = '85em'; }
        if (sr[2]) { sr[2].style.top = '23em'; sr[2].style.left = '13em'; }
        if (sr[3]) { sr[3].style.top = '34em'; sr[3].style.left = '60em'; }
        if (sr[4]) { sr[4].style.top = '18em'; sr[4].style.left = '69em'; }
        if (sr[5]) { sr[5].style.top = '48em'; sr[5].style.left = '32em'; }
      } else {
        mb.style.transform = 'translateX(10em)';
        db[0].style.transform = 'translateX(10em)'; db[1].style.transform = 'translateX(7em)'; db[2].style.transform = 'translateX(4em)';
        cs.forEach((c, i) => {
          const o = [
            [-48,20],[-24,-54],[34,-86],[92,-78],[140,-130],[218,-108],
            [-48,20],[-24,-54],[34,-86],[92,-78],[140,-130],[218,-108]
          ];
          if (i < o.length) { c.style.right = o[i][0]+'em'; c.style.bottom = o[i][1]+'em'; }
        });
      }
    });
    mb.addEventListener('mouseout', function() {
      if (isClicked) return;
      if (isMoved) {
        mb.style.transform = 'translateX(110em)';
        db[0].style.transform = 'translateX(110em)'; db[1].style.transform = 'translateX(80em)'; db[2].style.transform = 'translateX(50em)';
        if (sr[0]) { sr[0].style.top = '11em'; sr[0].style.left = '39em'; }
        if (sr[1]) { sr[1].style.top = '39em'; sr[1].style.left = '91em'; }
        if (sr[2]) { sr[2].style.top = '26em'; sr[2].style.left = '19em'; }
        if (sr[3]) { sr[3].style.top = '37em'; sr[3].style.left = '66em'; }
        if (sr[4]) { sr[4].style.top = '21em'; sr[4].style.left = '75em'; }
        if (sr[5]) { sr[5].style.top = '51em'; sr[5].style.left = '38em'; }
      } else {
        mb.style.transform = 'translateX(0em)';
        db[0].style.transform = 'translateX(0em)'; db[1].style.transform = 'translateX(0em)'; db[2].style.transform = 'translateX(0em)';
        cs.forEach((c, i) => {
          const o = [
            [-20,10],[-10,-25],[20,-40],[50,-35],[75,-60],[110,-50],
            [-20,10],[-10,-25],[20,-40],[50,-35],[75,-60],[110,-50]
          ];
          if (i < o.length) { c.style.right = o[i][0]+'em'; c.style.bottom = o[i][1]+'em'; }
        });
      }
    });
    const dirs = ['2em','-2em'];
    const rand = () => dirs[Math.floor(Math.random()*2)];
    setInterval(() => { root.querySelectorAll('.cs').forEach(e => { e.style.transform = `translate(${rand()},${rand()})`; }); }, 1000);
    if (initTheme === 'dark') requestAnimationFrame(() => applyToggle());
    return { applyToggle, getState: () => isMoved };
  };

  class ThemeButton extends HTMLElement {
    static observedAttributes = ['value'];
    attributeChangedCallback(name, oldVal, newVal) {
      if (name === 'value' && oldVal && oldVal !== newVal && this._toggle && this._getState) {
        const isDark = this._getState();
        const wantDark = newVal === 'dark';
        if (isDark !== wantDark) {
          if (wantDark) requestAnimationFrame(() => this._toggle());
          else this._toggle();
        }
      }
    }
    connectedCallback() {
      const init = this.getAttribute('value') || 'light';
      const sz = +this.getAttribute('size') || 3;
      const shadow = this.attachShadow({ mode: 'closed' });
      const c = document.createElement('div');
      c.setAttribute('style', `font-size:${(sz/3).toFixed(2)}px;position:relative;display:inline-block`);
      c.innerHTML = `<div class="ct" style="width:180em;height:70em;background:rgba(70,133,192,1);border-radius:100em;box-shadow:inset 0 0 5em 3em rgba(0,0,0,0.5);overflow:hidden;transition:.7s cubic-bezier(0,.5,1,1);cursor:pointer;position:relative;"><div class="mb" style="margin:7.5em 0 0 7.5em;width:55em;height:55em;background:rgba(255,195,35,1);border-radius:50%;box-shadow:3em 3em 5em rgba(0,0,0,0.5),inset -3em -5em 3em -3em rgba(0,0,0,0.5),inset 4em 5em 2em -2em rgba(255,230,80,1);transition:1s cubic-bezier(.56,1.35,.52,1);position:relative;z-index:3;"><div class="mo" style="position:absolute;background:rgba(150,160,180,1);box-shadow:inset 0 0 1em 1em rgba(0,0,0,0.3);border-radius:50%;transition:.5s;opacity:0;"></div><div class="mo" style="position:absolute;background:rgba(150,160,180,1);box-shadow:inset 0 0 1em 1em rgba(0,0,0,0.3);border-radius:50%;transition:.5s;opacity:0;"></div><div class="mo" style="position:absolute;background:rgba(150,160,180,1);box-shadow:inset 0 0 1em 1em rgba(0,0,0,0.3);border-radius:50%;transition:.5s;opacity:0;"></div></div><div class="db" style="position:absolute;border-radius:50%;transition:1s cubic-bezier(.56,1.35,.52,1);top:-20em;left:-20em;width:110em;height:110em;background:rgba(255,255,255,0.2);z-index:-2;"></div><div class="db" style="position:absolute;border-radius:50%;transition:1s cubic-bezier(.56,1.35,.52,1);top:-32.5em;left:-17.5em;width:135em;height:135em;background:rgba(255,255,255,0.1);z-index:-3;"></div><div class="db" style="position:absolute;border-radius:50%;transition:1s cubic-bezier(.56,1.35,.52,1);top:-45em;left:-15em;width:160em;height:160em;background:rgba(255,255,255,0.05);z-index:-4;"></div><div class="cl" style="transform:translateY(10em);transition:1s cubic-bezier(.56,1.35,.52,1);z-index:-2;"><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:-20em;bottom:10em;width:50em;height:50em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:-10em;bottom:-25em;width:60em;height:60em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:20em;bottom:-40em;width:60em;height:60em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:50em;bottom:-35em;width:60em;height:60em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:75em;bottom:-60em;width:75em;height:75em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:110em;bottom:-50em;width:60em;height:60em;"></div></div><div class="cll" style="position:absolute;right:0;bottom:25em;opacity:.5;z-index:-3;transform:translateY(10em);transition:1s cubic-bezier(.56,1.35,.52,1);"><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:-20em;bottom:10em;width:50em;height:50em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:-10em;bottom:-25em;width:60em;height:60em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:20em;bottom:-40em;width:60em;height:60em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:50em;bottom:-35em;width:60em;height:60em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:75em;bottom:-60em;width:75em;height:75em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:110em;bottom:-50em;width:60em;height:60em;"></div></div><div class="st" style="transform:translateY(-125em);z-index:-2;transition:1s cubic-bezier(.56,1.35,.52,1);opacity:0;">${[1,2,3,4,5,6].map(i => '<div class="sr ' + (i<3?'big':i<5?'med':'sml') + '" style="position:absolute;width:calc(2*var(--s));height:calc(2*var(--s));' + ({1:'top:11em;left:39em',2:'top:39em;left:91em',3:'top:26em;left:19em',4:'top:37em;left:66em',5:'top:21em;left:75em',6:'top:51em;left:38em'})[i] + ';transform:scale(1);transition:1s;animation-iteration-count:infinite;animation-direction:alternate;animation-timing-function:linear;animation-name:' + ({1:'st1',2:'st2',3:'st3',4:'st4',5:'st5',6:'st6'})[i] + ';animation-duration:' + ({1:'3.5s',2:'4.1s',3:'4.9s',4:'5.3s',5:'3s',6:'2.2s'})[i] + ';"><div class="ss" style="float:left;width:var(--s);height:var(--s);background-image:radial-gradient(circle var(--s) at left 0,transparent var(--s),#fff);"></div><div class="ss" style="float:left;width:var(--s);height:var(--s);background-image:radial-gradient(circle var(--s) at right 0,transparent var(--s),#fff);"></div><div class="ss" style="float:left;width:var(--s);height:var(--s);background-image:radial-gradient(circle var(--s) at 0 bottom,transparent var(--s),#fff);"></div><div class="ss" style="float:left;width:var(--s);height:var(--s);background-image:radial-gradient(circle var(--s) at right bottom,transparent var(--s),#fff);"></div></div>').join('')}</div></div>`;
      const style = document.createElement('style');
      style.textContent = '.cs{transition:transform 6s,right 1s,bottom 1s}.sr{transition:1s}.big{--s:7.5px}.med{--s:5px}.sml{--s:3px}.mo:nth-child(1){top:7.5em;left:25em;width:12.5em;height:12.5em}.mo:nth-child(2){top:20em;left:7.5em;width:20em;height:20em}.mo:nth-child(3){top:32.5em;left:32.5em;width:12.5em;height:12.5em}@keyframes st1{0%,20%{transform:scale(0)}20%,100%{transform:scale(1)}}@keyframes st2{0%,20%{transform:scale(0)}20%,100%{transform:scale(1)}}@keyframes st3{0%,20%{transform:scale(0)}20%,100%{transform:scale(1)}}@keyframes st4{0%,20%{transform:scale(0)}20%,100%{transform:scale(1)}}@keyframes st5{0%,20%{transform:scale(0)}20%,100%{transform:scale(1)}}@keyframes st6{0%,20%{transform:scale(0)}20%,100%{transform:scale(1)}}';
      const result = func(c, init, d => { this.dispatchEvent(new CustomEvent('change', { detail: d, bubbles: true })); });
      this._toggle = result.applyToggle;
      this._getState = result.getState;
      shadow.appendChild(style); shadow.appendChild(c);
    }
  }
  customElements.define('theme-button', ThemeButton);
})();

/* =========================================================
   全局同步 + 涟漪动画
   ========================================================= */
let _syncing = false;
let _clickX = 0, _clickY = 0;

// Track click position globally (capture phase, before any handler)
document.addEventListener('click', e => { _clickX = e.clientX; _clickY = e.clientY; }, true);

function syncTB(id, dark) {
  const tb = document.querySelector('#' + id + ' theme-button');
  if (!tb) return;
  tb.setAttribute('value', dark ? 'dark' : 'light');
}

function doSyncBody(dark) {
  if (dark) {
    document.body.classList.add('dark');
    if (!v1.isDark()) v1.toggle();
    if (!v2.isDark()) v2.toggle();
  } else {
    document.body.classList.remove('dark');
    if (v1.isDark()) v1.toggle();
    if (v2.isDark()) v2.toggle();
  }
  syncTB('v3wrap', dark);
  syncTB('v4wrap', dark);
}

function syncBody(dark) {
  if (_syncing) return;
  _syncing = true;
  
  if (document.startViewTransition) {
    const cx = _clickX, cy = _clickY;
    const endRadius = Math.hypot(Math.max(cx, innerWidth - cx), Math.max(cy, innerHeight - cy));
    const vt = document.startViewTransition(() => doSyncBody(dark));
    vt.ready.then(() => {
      document.documentElement.animate(
        { clipPath: ['circle(0 at ' + cx + 'px ' + cy + 'px)', 'circle(' + endRadius + 'px at ' + cx + 'px ' + cy + 'px)'] },
        { duration: 1400, easing: 'cubic-bezier(0.4,0,0.5,1)', fill: 'forwards', pseudoElement: '::view-transition-new(root)' }
      );
      _syncing = false;
    });
  } else {
    doSyncBody(dark);
    _syncing = false;
  }
}

v1.el.addEventListener('click', () => syncBody(v1.isDark()));
v2.el.addEventListener('click', () => syncBody(v2.isDark()));

document.addEventListener('change', e => {
  if (e.target.tagName === 'THEME-BUTTON') {
    syncBody(e.detail === 'dark');
  }
});
</script>
