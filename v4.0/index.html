<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>白天黑夜切换按钮 v4.0 — Web Component + 系统主题检测</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f8fafc; color: #0f172a;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  transition: background 0.7s, color 0.7s;
}
body.dark { background: #0f172a; color: #f1f5f9; }
::view-transition-old(root) { animation: none; }
::view-transition-new(root) { animation: none; }
</style>
</head>
<body>
<theme-button value="light" size="3"></theme-button>
<script>
(() => {
  const func = (root, initTheme, changeTheme) => {
    const $ = s => { const d = root.querySelectorAll(s); return d.length === 1 ? d[0] : d; };
    const mb = $('.mb'), db = $('.db'), cl = $('.cl'), cs = $('.cs'), cll = $('.cll'), ct = $('.ct'), mo = $('.mo'), st = $('.st'), sr = $('.sr');
    let isMoved = false, isClicked = false;

    const applyToggle = () => {
      if (isMoved) {
        mb.style.transform = 'translateX(0)'; mb.style.backgroundColor = 'rgba(255,195,35,1)';
        mb.style.boxShadow = '3em 3em 5em rgba(0,0,0,0.5), inset -3em -5em 3em -3em rgba(0,0,0,0.5), inset 4em 5em 2em -2em rgba(255,230,80,1)';
        db[0].style.transform = 'translateX(0)'; db[1].style.transform = 'translateX(0)'; db[2].style.transform = 'translateX(0)';
        cl.style.transform = 'translateY(10em)'; cll.style.transform = 'translateY(10em)';
        ct.style.backgroundColor = 'rgba(70,133,192,1)';
        mo.forEach(m => m.style.opacity = '0');
        st.style.transform = 'translateY(-125em)'; st.style.opacity = '0';
      } else {
        mb.style.transform = 'translateX(110em)'; mb.style.backgroundColor = 'rgba(195,200,210,1)';
        mb.style.boxShadow = '3em 3em 5em rgba(0,0,0,0.5), inset -3em -5em 3em -3em rgba(0,0,0,0.5), inset 4em 5em 2em -2em rgba(255,255,210,1)';
        db[0].style.transform = 'translateX(110em)'; db[1].style.transform = 'translateX(80em)'; db[2].style.transform = 'translateX(50em)';
        cl.style.transform = 'translateY(80em)'; cll.style.transform = 'translateY(80em)';
        ct.style.backgroundColor = 'rgba(25,30,50,1)';
        mo.forEach(m => m.style.opacity = '1');
        st.style.transform = 'translateY(-62.5em)'; st.style.opacity = '1';
      }
      isMoved = !isMoved;
    };

    ct.onclick = () => {
      applyToggle();
      changeTheme(isMoved ? 'dark' : 'light');
      isClicked = true; setTimeout(() => { isClicked = false; }, 500);
    };
    mb.addEventListener('mousemove', function() {
      if (isClicked) return;
      if (isMoved) {
        mb.style.transform = 'translateX(100em)';
        db[0].style.transform = 'translateX(100em)'; db[1].style.transform = 'translateX(73em)'; db[2].style.transform = 'translateX(46em)';
        if (sr[0]) { sr[0].style.top = '10em'; sr[0].style.left = '36em'; }
        if (sr[1]) { sr[1].style.top = '40em'; sr[1].style.left = '87em'; }
        if (sr[2]) { sr[2].style.top = '26em'; sr[2].style.left = '16em'; }
        if (sr[3]) { sr[3].style.top = '38em'; sr[3].style.left = '63em'; }
        if (sr[4]) { sr[4].style.top = '20.5em'; sr[4].style.left = '72em'; }
        if (sr[5]) { sr[5].style.top = '51.5em'; sr[5].style.left = '35em'; }
      } else {
        mb.style.transform = 'translateX(10em)';
        db[0].style.transform = 'translateX(10em)'; db[1].style.transform = 'translateX(7em)'; db[2].style.transform = 'translateX(4em)';
        cs.forEach((c, i) => {
          const o = [
            [-24,10],[-12,-27],[17,-43],[46,-39],[70,-65],[109,-54],
            [-23,10],[-11,-26],[18,-42],[47,-38],[74,-64],[110,-55]
          ];
          if (i < o.length) { c.style.right = o[i][0]+'em'; c.style.bottom = o[i][1]+'em'; }
        });
      }
    });
    mb.addEventListener('mouseout', function() {
      if (isClicked) return;
      if (isMoved) {
        mb.style.transform = 'translateX(110em)';
        db[0].style.transform = 'translateX(110em)'; db[1].style.transform = 'translateX(80em)'; db[2].style.transform = 'translateX(50em)';
        if (sr[0]) { sr[0].style.top = '11em'; sr[0].style.left = '39em'; }
        if (sr[1]) { sr[1].style.top = '39em'; sr[1].style.left = '91em'; }
        if (sr[2]) { sr[2].style.top = '26em'; sr[2].style.left = '19em'; }
        if (sr[3]) { sr[3].style.top = '37em'; sr[3].style.left = '66em'; }
        if (sr[4]) { sr[4].style.top = '21em'; sr[4].style.left = '75em'; }
        if (sr[5]) { sr[5].style.top = '51em'; sr[5].style.left = '38em'; }
      } else {
        mb.style.transform = 'translateX(0em)';
        db[0].style.transform = 'translateX(0em)'; db[1].style.transform = 'translateX(0em)'; db[2].style.transform = 'translateX(0em)';
        cs.forEach((c, i) => {
          const o = [
            [-20,10],[-10,-25],[20,-40],[50,-35],[75,-60],[110,-50],
            [-20,10],[-10,-25],[20,-40],[50,-35],[75,-60],[110,-50]
          ];
          if (i < o.length) { c.style.right = o[i][0]+'em'; c.style.bottom = o[i][1]+'em'; }
        });
      }
    });
    const dirs = ['2em','-2em'];
    const rand = () => dirs[Math.floor(Math.random()*2)];
    setInterval(() => { root.querySelectorAll('.cs').forEach(e => { e.style.transform = `translate(${rand()},${rand()})`; }); }, 1000);
    if (initTheme === 'dark') requestAnimationFrame(() => applyToggle());

    // v4: system theme auto-detection
    const mq = window.matchMedia('(prefers-color-scheme: dark)');
    mq.addEventListener('change', () => {
      if (mq.matches && !isMoved) {
        applyToggle();
        changeTheme('dark');
      } else if (!mq.matches && isMoved) {
        applyToggle();
        changeTheme('light');
      }
    });

    return { applyToggle, getState: () => isMoved };
  };

  class ThemeButton extends HTMLElement {
    static observedAttributes = ['value'];
    attributeChangedCallback(name, oldVal, newVal) {
      if (name === 'value' && oldVal && oldVal !== newVal && this._toggle && this._getState) {
        const isDark = this._getState();
        const wantDark = newVal === 'dark';
        if (isDark !== wantDark) {
          if (wantDark) requestAnimationFrame(() => this._toggle());
          else this._toggle();
        }
      }
    }
    connectedCallback() {
      const init = this.getAttribute('value') || 'light';
      const sz = +this.getAttribute('size') || 3;
      const shadow = this.attachShadow({ mode: 'closed' });
      const c = document.createElement('div');
      c.setAttribute('style', `font-size:${(sz/3).toFixed(2)}px;position:relative;display:inline-block`);
      c.innerHTML = '<div class="ct" style="width:180em;height:70em;background:rgba(70,133,192,1);border-radius:100em;box-shadow:inset 0 0 5em 3em rgba(0,0,0,0.5);overflow:hidden;transition:.7s cubic-bezier(0,.5,1,1);cursor:pointer;position:relative;"><div class="mb" style="margin:7.5em 0 0 7.5em;width:55em;height:55em;background:rgba(255,195,35,1);border-radius:50%;box-shadow:3em 3em 5em rgba(0,0,0,0.5),inset -3em -5em 3em -3em rgba(0,0,0,0.5),inset 4em 5em 2em -2em rgba(255,230,80,1);transition:1s cubic-bezier(.56,1.35,.52,1);position:relative;z-index:3;"><div class="mo" style="position:absolute;background:rgba(150,160,180,1);box-shadow:inset 0 0 1em 1em rgba(0,0,0,0.3);border-radius:50%;transition:.5s;opacity:0;"></div><div class="mo" style="position:absolute;background:rgba(150,160,180,1);box-shadow:inset 0 0 1em 1em rgba(0,0,0,0.3);border-radius:50%;transition:.5s;opacity:0;"></div><div class="mo" style="position:absolute;background:rgba(150,160,180,1);box-shadow:inset 0 0 1em 1em rgba(0,0,0,0.3);border-radius:50%;transition:.5s;opacity:0;"></div></div><div class="db" style="position:absolute;border-radius:50%;transition:1s cubic-bezier(.56,1.35,.52,1);top:-20em;left:-20em;width:110em;height:110em;background:rgba(255,255,255,0.2);z-index:-2;"></div><div class="db" style="position:absolute;border-radius:50%;transition:1s cubic-bezier(.56,1.35,.52,1);top:-32.5em;left:-17.5em;width:135em;height:135em;background:rgba(255,255,255,0.1);z-index:-3;"></div><div class="db" style="position:absolute;border-radius:50%;transition:1s cubic-bezier(.56,1.35,.52,1);top:-45em;left:-15em;width:160em;height:160em;background:rgba(255,255,255,0.05);z-index:-4;"></div><div class="cl" style="transform:translateY(10em);transition:1s cubic-bezier(.56,1.35,.52,1);z-index:-2;"><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:-20em;bottom:10em;width:50em;height:50em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:-10em;bottom:-25em;width:60em;height:60em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:20em;bottom:-40em;width:60em;height:60em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:50em;bottom:-35em;width:60em;height:60em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:75em;bottom:-60em;width:75em;height:75em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:110em;bottom:-50em;width:60em;height:60em;"></div></div><div class="cll" style="position:absolute;right:0;bottom:25em;opacity:.5;z-index:-3;"><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:-20em;bottom:10em;width:50em;height:50em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:-10em;bottom:-25em;width:60em;height:60em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:20em;bottom:-40em;width:60em;height:60em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:50em;bottom:-35em;width:60em;height:60em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:75em;bottom:-60em;width:75em;height:75em;"></div><div class="cs" style="position:absolute;background:#fff;border-radius:50%;z-index:-1;right:110em;bottom:-50em;width:60em;height:60em;"></div></div><div class="st" style="transform:translateY(-125em);z-index:-2;transition:1s cubic-bezier(.56,1.35,.52,1);"><div class="sr big" style="position:absolute;width:15em;height:15em;top:11em;left:39em;"><div class="ss" style="float:left;width:7.5em;height:7.5em;background-image:radial-gradient(circle 7.5em at left 0,transparent 7.5em,#fff);"></div><div class="ss" style="float:left;width:7.5em;height:7.5em;background-image:radial-gradient(circle 7.5em at right 0,transparent 7.5em,#fff);"></div><div class="ss" style="float:left;width:7.5em;height:7.5em;background-image:radial-gradient(circle 7.5em at 0 bottom,transparent 7.5em,#fff);"></div><div class="ss" style="float:left;width:7.5em;height:7.5em;background-image:radial-gradient(circle 7.5em at right bottom,transparent 7.5em,#fff);"></div></div><div class="sr big" style="position:absolute;width:15em;height:15em;top:39em;left:91em;"><div class="ss" style="float:left;width:7.5em;height:7.5em;background-image:radial-gradient(circle 7.5em at left 0,transparent 7.5em,#fff);"></div><div class="ss" style="float:left;width:7.5em;height:7.5em;background-image:radial-gradient(circle 7.5em at right 0,transparent 7.5em,#fff);"></div><div class="ss" style="float:left;width:7.5em;height:7.5em;background-image:radial-gradient(circle 7.5em at 0 bottom,transparent 7.5em,#fff);"></div><div class="ss" style="float:left;width:7.5em;height:7.5em;background-image:radial-gradient(circle 7.5em at right bottom,transparent 7.5em,#fff);"></div></div><div class="sr med" style="position:absolute;width:10em;height:10em;top:26em;left:19em;"><div class="ss" style="float:left;width:5em;height:5em;background-image:radial-gradient(circle 5em at left 0,transparent 5em,#fff);"></div><div class="ss" style="float:left;width:5em;height:5em;background-image:radial-gradient(circle 5em at right 0,transparent 5em,#fff);"></div><div class="ss" style="float:left;width:5em;height:5em;background-image:radial-gradient(circle 5em at 0 bottom,transparent 5em,#fff);"></div><div class="ss" style="float:left;width:5em;height:5em;background-image:radial-gradient(circle 5em at right bottom,transparent 5em,#fff);"></div></div><div class="sr med" style="position:absolute;width:10em;height:10em;top:37em;left:66em;"><div class="ss" style="float:left;width:5em;height:5em;background-image:radial-gradient(circle 5em at left 0,transparent 5em,#fff);"></div><div class="ss" style="float:left;width:5em;height:5em;background-image:radial-gradient(circle 5em at right 0,transparent 5em,#fff);"></div><div class="ss" style="float:left;width:5em;height:5em;background-image:radial-gradient(circle 5em at 0 bottom,transparent 5em,#fff);"></div><div class="ss" style="float:left;width:5em;height:5em;background-image:radial-gradient(circle 5em at right bottom,transparent 5em,#fff);"></div></div><div class="sr sml" style="position:absolute;width:6em;height:6em;top:21em;left:75em;"><div class="ss" style="float:left;width:3em;height:3em;background-image:radial-gradient(circle 3em at left 0,transparent 3em,#fff);"></div><div class="ss" style="float:left;width:3em;height:3em;background-image:radial-gradient(circle 3em at right 0,transparent 3em,#fff);"></div><div class="ss" style="float:left;width:3em;height:3em;background-image:radial-gradient(circle 3em at 0 bottom,transparent 3em,#fff);"></div><div class="ss" style="float:left;width:3em;height:3em;background-image:radial-gradient(circle 3em at right bottom,transparent 3em,#fff);"></div></div><div class="sr sml" style="position:absolute;width:6em;height:6em;top:51em;left:38em;"><div class="ss" style="float:left;width:3em;height:3em;background-image:radial-gradient(circle 3em at left 0,transparent 3em,#fff);"></div><div class="ss" style="float:left;width:3em;height:3em;background-image:radial-gradient(circle 3em at right 0,transparent 3em,#fff);"></div><div class="ss" style="float:left;width:3em;height:3em;background-image:radial-gradient(circle 3em at 0 bottom,transparent 3em,#fff);"></div><div class="ss" style="float:left;width:3em;height:3em;background-image:radial-gradient(circle 3em at right bottom,transparent 3em,#fff);"></div></div></div></div>';
      const style = document.createElement('style');
      style.textContent = '.cs{transition:transform 6s,right 1s,bottom 1s}.sr{transition:1s}.big{--s:7.5px}.med{--s:5px}.sml{--s:3px}.mo:nth-child(1){top:7.5em;left:25em;width:12.5em;height:12.5em}.mo:nth-child(2){top:20em;left:7.5em;width:20em;height:20em}.mo:nth-child(3){top:32.5em;left:32.5em;width:12.5em;height:12.5em}@keyframes st1{0%,20%{transform:scale(0)}20%,100%{transform:scale(1)}}@keyframes st2{0%,20%{transform:scale(0)}20%,100%{transform:scale(1)}}@keyframes st3{0%,20%{transform:scale(0)}20%,100%{transform:scale(1)}}@keyframes st4{0%,20%{transform:scale(0)}20%,100%{transform:scale(1)}}@keyframes st5{0%,20%{transform:scale(0)}20%,100%{transform:scale(1)}}@keyframes st6{0%,20%{transform:scale(0)}20%,100%{transform:scale(1)}}';
      const result = func(c, init, d => { this.dispatchEvent(new CustomEvent('change', { detail: d, bubbles: true })); });
      this._toggle = result.applyToggle;
      this._getState = result.getState;
      shadow.appendChild(style); shadow.appendChild(c);
    }
  }
  customElements.define('theme-button', ThemeButton);

  // ripple animation
  let _syncing = false;
  let _clickX = 0, _clickY = 0;
  document.addEventListener('click', e => { _clickX = e.clientX; _clickY = e.clientY; }, true);
  function syncBody(isDark) {
    if (_syncing) return;
    _syncing = true;
    if (document.startViewTransition) {
      const cx = _clickX, cy = _clickY;
      const endRadius = Math.hypot(Math.max(cx, innerWidth - cx), Math.max(cy, innerHeight - cy));
      const vt = document.startViewTransition(() => {
        if (isDark) document.body.classList.add('dark');
        else document.body.classList.remove('dark');
      });
      vt.ready.then(() => {
        document.documentElement.animate(
          { clipPath: ['circle(0 at ' + cx + 'px ' + cy + 'px)', 'circle(' + endRadius + 'px at ' + cx + 'px ' + cy + 'px)'] },
          { duration: 1400, easing: 'cubic-bezier(0.4,0,0.5,1)', fill: 'forwards', pseudoElement: '::view-transition-new(root)' }
        );
        _syncing = false;
      });
    } else {
      if (isDark) document.body.classList.add('dark');
      else document.body.classList.remove('dark');
      _syncing = false;
    }
  }
  document.addEventListener('change', e => {
    if (e.target.tagName === 'THEME-BUTTON') {
      syncBody(e.detail === 'dark');
    }
  });
})();
</script>
</body>
</html>
